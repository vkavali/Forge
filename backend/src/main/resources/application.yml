server:
  port: ${PORT:8080}

spring:
  application:
    name: theshipboard
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:forge}
    username: ${POSTGRES_USER:forge}
    password: ${POSTGRES_PASSWORD:forge}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:forge-artifacts}

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  max-tokens: 4096

build-runner:
  url: ${BUILD_RUNNER_URL:http://localhost:5100}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100
